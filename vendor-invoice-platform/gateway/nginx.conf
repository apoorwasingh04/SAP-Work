worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # Logs as event streams to stdout/stderr (12-factor XI)
  access_log /dev/stdout;
  error_log  /dev/stderr warn;

  upstream vendor      { server vendor-service:4004; }
  upstream invoice     { server invoice-service:4004; }
  upstream approval    { server approval-service:4004; }
  upstream integration { server integration-service:4004; }

  # Dev convenience: if the browser sends no Authorization header, authenticate as
  # admin (admin:admin -> base64). Any real Authorization header is passed through
  # unchanged. In production this gateway is replaced by the SAP approuter + XSUAA.
  map $http_authorization $auth {
    default  $http_authorization;
    ""       "Basic YWRtaW46YWRtaW4=";
  }

  server {
    listen 8080;

    location /vendor/      { proxy_set_header Authorization $auth; proxy_pass http://vendor/odata/v4/vendor/; }
    location /invoice/     { proxy_set_header Authorization $auth; proxy_pass http://invoice/odata/v4/invoice/; }
    location /approval/    { proxy_set_header Authorization $auth; proxy_pass http://approval/odata/v4/approval/; }
    location /integration/ { proxy_set_header Authorization $auth; proxy_pass http://integration/odata/v4/integration/; }

    location = /health {
      default_type text/plain;
      return 200 'gateway UP\n';
    }

    # Static Fiori UI. Fiori Elements uses hash-based routing (#/...), so deep
    # links never reach the server -> NO index.html fallback. Missing assets must
    # return 404 (not index.html) or UI5 tries to parse HTML as JS and crashes
    # (e.g. the optional Component-preload.js and SAP flex/LREP endpoints).
    location / {
      root /usr/share/nginx/html;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
      try_files $uri $uri/ =404;
    }
  }
}
